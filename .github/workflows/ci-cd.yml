name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  security-events: write  # Required for SARIF upload
env:
  AWS_REGION: us-east-1
  APP_NAME: my-app
  ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}

jobs:
  # ============================================
  # CI - Continuous Integration
  # ============================================
  ci:
    name: CI
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test -- --coverage

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  # ============================================
  # Security Scan
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: ci
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================
  # Build and Push Docker Image
  # ============================================
  build:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: [ci, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2


      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.APP_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Infrastructure Validation (Terraform)
  # ============================================
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug repo structure
        run: ls -R

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}"

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -out=tfplan
        continue-on-error: true

  # ============================================
  # Deploy to Staging (Develop branch)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, terraform-validate]
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS Staging
        run: |
          CLUSTER_NAME="prod-cluster"
          SERVICE_NAME="staging-service"
          STAGING_URL="${{ secrets.STAGING_URL }}"
          
          echo "Checking if ECS service exists..."
          if aws ecs describe-services --cluster $CLUSTER_NAME --services $SERVICE_NAME 2>/dev/null | grep -q "$SERVICE_NAME"; then
            echo "ECS service found, updating..."
            aws ecs update-service --cluster $CLUSTER_NAME --service $SERVICE_NAME --force-new-deployment
            echo "Waiting for service to stabilize..."
            aws ecs wait services-stable --cluster $CLUSTER_NAME --services $SERVICE_NAME
            echo "Service updated successfully"
          else
            echo "ECS service not found, skipping deployment"
            exit 0
          fi
          
          # Health check
          if [ -z "$STAGING_URL" ]; then
            echo "Staging URL not configured, skipping health check"
            exit 0
          fi
          
          echo "Testing Staging URL: $STAGING_URL"
          # Retry logic for health check
          for i in {1..12}; do
            if curl -f "$STAGING_URL/health" 2>/dev/null; then
              echo "Staging health check passed"
              exit 0
            fi
            if [ $i -lt 12 ]; then
              echo "Health check failed, retrying in 10 seconds... (attempt $i/12)"
              sleep 10
            fi
          done
          echo "Staging health check failed after all retries"
          exit 1

  # ============================================
  # Deploy to Production (Main branch)
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, terraform-validate]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS Production
        run: |
          CLUSTER_NAME="prod-cluster"
          SERVICE_NAME="prod-service"
          PROD_URL="${{ secrets.PROD_URL }}"
          
          echo "Checking if ECS service exists..."
          if aws ecs describe-services --cluster $CLUSTER_NAME --services $SERVICE_NAME 2>/dev/null | grep -q "$SERVICE_NAME"; then
            echo "ECS service found, updating..."
            aws ecs update-service --cluster $CLUSTER_NAME --service $SERVICE_NAME --force-new-deployment
            echo "Waiting for service to stabilize..."
            aws ecs wait services-stable --cluster $CLUSTER_NAME --services $SERVICE_NAME
            echo "Service updated successfully"
          else
            echo "ECS service not found, checking health endpoint instead..."
          fi
          
          # Health check
          if [ -z "$PROD_URL" ]; then
            echo "Production URL not configured, skipping health check"
            exit 0
          fi
          
          echo "Testing Production URL: $PROD_URL"
          # Retry logic for health check (service may take time to start)
          for i in {1..12}; do
            if curl -f "$PROD_URL/health" 2>/dev/null; then
              echo "Production health check passed"
              exit 0
            fi
            if [ $i -lt 12 ]; then
              echo "Health check failed, retrying in 10 seconds... (attempt $i/12)"
              sleep 10
            fi
          done
          echo "Production health check failed after all retries"
          exit 1

